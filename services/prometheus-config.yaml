global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # ============ INFRASTRUCTURE ============

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Proxmox Host OS
  - job_name: 'proxmox-node'
    static_configs:
      - targets: ['192.168.0.151:9100']
        labels:
          instance: 'proxmox-host'

  # Proxmox VE API (LXC/VM stats)
  - job_name: 'proxmox-pve'
    static_configs:
      - targets: ['192.168.0.151:9221']
    metrics_path: /pve
    params:
      target: ['localhost']

  # Docker containers via cAdvisor
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # ============ LXC CONTAINERS ============

  - job_name: 'lxc-containers'
    static_configs:
      - targets: ['192.168.0.11:9100']
        labels: {container: 'adguard', vmid: '101'}
      - targets: ['192.168.0.13:9100']
        labels: {container: 'emby', vmid: '102'}
      - targets: ['192.168.0.45:9100']
        labels: {container: 'syncthing', vmid: '103'}
      - targets: ['192.168.0.176:9100']
        labels: {container: 'samba', vmid: '104'}
      - targets: ['192.168.0.207:9100']
        labels: {container: 'unmanic', vmid: '105'}
      - targets: ['192.168.0.42:9100']
        labels: {container: 'radarr', vmid: '107'}
      - targets: ['192.168.0.153:9100']
        labels: {container: 'zwave-js-ui', vmid: '108'}
      - targets: ['192.168.0.24:9100']
        labels: {container: 'sonarr', vmid: '110'}
      - targets: ['192.168.0.209:9100']
        labels: {container: 'urbackup', vmid: '111'}
      - targets: ['192.168.0.30:9100']
        labels: {container: 'nginxproxymanager', vmid: '112'}
      - targets: ['192.168.0.43:9100']
        labels: {container: 'jellyseerr', vmid: '113'}
      - targets: ['192.168.0.44:9100']
        labels: {container: 'uptimekuma', vmid: '114'}
      - targets: ['192.168.0.48:9100']
        labels: {container: 'bazarr', vmid: '115'}
      - targets: ['192.168.0.57:9100']
        labels: {container: 'wikijs', vmid: '117'}
      - targets: ['192.168.0.70:9100']
        labels: {container: 'homepage', vmid: '118'}
      - targets: ['192.168.0.180:9100']
        labels: {container: 'claude-ai', vmid: '124'}
      - targets: ['192.168.0.179:9100']
        labels: {container: 'komodo', vmid: '128'}
      - targets: ['192.168.0.175:9100']
        labels: {container: 'pulse', vmid: '120'}

  # ============ SERVICES (Native) ============

  - job_name: 'birdnet-go'
    static_configs:
      - targets: ['192.168.0.179:7828']
        labels: {instance: 'birdnet-go'}

  - job_name: 'frigate'
    static_configs:
      - targets: ['192.168.0.179:5000']
        labels: {instance: 'frigate-docker'}
    metrics_path: /api/metrics

  # ============ BLACKBOX PROBES ============

  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      # Infrastructure
      - targets: ['https://192.168.0.151:8006']
        labels: {name: 'Proxmox'}
      - targets: ['http://192.168.0.11:80']
        labels: {name: 'AdGuard'}
      - targets: ['http://192.168.0.30:81']
        labels: {name: 'NPM'}
      - targets: ['http://192.168.0.44:3001']
        labels: {name: 'Uptime Kuma'}
      - targets: ['http://192.168.0.70:3000']
        labels: {name: 'Homepage'}
      # Media
      - targets: ['http://192.168.0.13:8096']
        labels: {name: 'Emby'}
      - targets: ['http://192.168.0.42:7878']
        labels: {name: 'Radarr'}
      - targets: ['http://192.168.0.24:8989']
        labels: {name: 'Sonarr'}
      - targets: ['http://192.168.0.48:6767']
        labels: {name: 'Bazarr'}
      - targets: ['http://192.168.0.43:5055']
        labels: {name: 'Jellyseerr'}
      # Komodo Docker services
      - targets: ['http://192.168.0.179:9120']
        labels: {name: 'Komodo'}
      - targets: ['http://192.168.0.179:3001']
        labels: {name: 'Grafana'}
      - targets: ['http://192.168.0.179:2283']
        labels: {name: 'Immich'}
      - targets: ['http://192.168.0.179:5000']
        labels: {name: 'Frigate'}
      - targets: ['http://192.168.0.179:8010']
        labels: {name: 'Paperless'}
      - targets: ['http://192.168.0.179:8070']
        labels: {name: 'Fragments'}
      - targets: ['http://192.168.0.179:8090']
        labels: {name: 'Tandoor'}
      - targets: ['http://192.168.0.179:8095']
        labels: {name: 'BentoPDF'}
      - targets: ['http://192.168.0.179:3214']
        labels: {name: 'Manyfold'}
      - targets: ['http://192.168.0.179:9925']
        labels: {name: 'Mealie'}
      # Other LXCs
      - targets: ['http://192.168.0.45:8384']
        labels: {name: 'Syncthing'}
      - targets: ['http://192.168.0.57:3000']
        labels: {name: 'Wiki.js'}
      - targets: ['http://192.168.0.153:8091']
        labels: {name: 'Z-Wave JS'}
      - targets: ['http://192.168.0.175:7655']
        labels: {name: 'Pulse'}
      - targets: ['http://192.168.0.209:55414']
        labels: {name: 'URBackup'}
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'blackbox-tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets: ['192.168.0.176:445']
        labels: {name: 'Samba SMB'}
      - targets: ['192.168.0.179:22']
        labels: {name: 'Komodo SSH'}
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
