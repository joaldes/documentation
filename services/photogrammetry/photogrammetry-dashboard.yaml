              **Total Positions:** {{ totals.get('total_positions_completed', 0)
              }}

              **Total Photos:** {{ totals.get('total_photos_captured', 0) | int
              }}


              ---


              ### 📈 Performance Trends

              {% set trends = state_attr('sensor.photogrammetry_lifetime_stats',
              'trends') or {} %}

              {% if trends.get('last_5_sessions_avg_position_time') %}

              **Recent (Last 5 Sessions)**

              Average position time: **{{
              trends.get('last_5_sessions_avg_position_time', 0) }}s**


              **All-Time Performance**

              Average position time: **{{
              trends.get('all_time_avg_position_time', 0) }}s**

              Trend: **{{ trends.get('trend_direction', 'stable') | capitalize
              }}** ({{ trends.get('performance_change_percent', 0) }}%)

              {% endif %}


              **Total Processing Time:** {{
              totals.get('total_processing_time_formatted', '0h 0m') }}

              **Total Data Volume:** {{ totals.get('total_data_volume_gb', 0) }}
              GB


              ---


              _Last updated: {{
              state_attr('sensor.photogrammetry_lifetime_stats', 'last_updated')
              | default('Never') }}_
