                icon: mdi:cellphone-link
          - type: horizontal-stack
            cards:
              - type: button
                name: Connect S10
                icon: mdi:connection
                tap_action:
                  action: call-service
                  service: rest_command.photogrammetry_select_s10
                  data: {}
              - type: button
                name: Disconnect All
                icon: mdi:close-network
                tap_action:
                  action: call-service
                  service: rest_command.photogrammetry_disconnect_devices
                  data: {}
          - type: entities
            title: 📱 Samsung S24
            show_header_toggle: false
            entities:
              - entity: sensor.photogrammetry_s24_adb_status
                name: Connection Status
                icon: mdi:cellphone-link
          - type: horizontal-stack
            cards:
              - type: button
                name: Connect S24
                icon: mdi:connection
                tap_action:
                  action: call-service
                  service: rest_command.photogrammetry_select_s24
                  data: {}
              - type: button
                name: Disconnect All
                icon: mdi:close-network
                tap_action:
                  action: call-service
                  service: rest_command.photogrammetry_disconnect_devices
                  data: {}
